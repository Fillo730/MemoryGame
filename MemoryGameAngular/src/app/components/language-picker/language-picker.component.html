<div class="dropdown">
  <button class="dropbtn">
    <span class="material-symbols-outlined">language</span>
    <span class="current-code">{{ languageService.language() }}</span>
  </button>
  
  <div class="dropdown-content">
    @for (lang of appConfig.LANG_OPTIONS; track lang.value) {
      <a (click)="languageService.setLanguage(lang.value)">
        {{ lang.label }}
      </a>
    }
  </div>
</div>
